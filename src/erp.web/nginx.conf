server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are content-addressed (e.g. index-iBljPJXE.js), so their
    # contents can never change under a fixed name. Cache them aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # The SPA shell (index.html and the history-fallback below) must never be cached,
    # so a fresh deploy is picked up on the next page load without a manual hard-refresh.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
