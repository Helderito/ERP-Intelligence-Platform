name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore ERP-Intelligence.sln

      - name: Build
        run: dotnet build ERP-Intelligence.sln --configuration Release --no-restore

      - name: Test
        run: >-
          dotnet test ERP-Intelligence.sln --configuration Release --no-build -m:1
          --collect:"XPlat Code Coverage"
          --results-directory ${{ github.workspace }}/coverage

      - name: Coverage summary
        if: always()
        run: |
          python3 - <<'PY'
          import glob, os, xml.etree.ElementTree as ET
          covered = valid = 0
          files = glob.glob("coverage/**/coverage.cobertura.xml", recursive=True)
          for f in files:
              root = ET.parse(f).getroot()
              covered += int(root.get("lines-covered", 0))
              valid += int(root.get("lines-valid", 0))
          pct = (covered / valid * 100) if valid else 0.0
          line = f"Line coverage: {pct:.1f}% ({covered}/{valid} lines) across {len(files)} test run(s)."
          print(line)
          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if summary:
              with open(summary, "a", encoding="utf-8") as fh:
                  fh.write(f"## Backend coverage\n\n{line}\n")
          PY

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/erp.web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: src/erp.web/package-lock.json

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
